# tools/configs/kubehunter.conf
# Kube-Hunter scan defaults for the toolkit
# Read by tools/vulnerability_scanning/kubehunter_scan.sh

#  Scan Mode 
# remote   — scan a specific IP / CIDR from outside the cluster
# pod      — run inside a pod (--pod flag); discovers the cluster automatically
# network  — active network discovery within the current subnet
KUBEHUNTER_MODE=remote

#  Target (used when KUBEHUNTER_MODE=remote) 
# Space-separated list of IPs or CIDR ranges
KUBEHUNTER_TARGETS="10.0.0.0/24"

#  Active Hunting 
# Set to "true" to enable active tests (may modify cluster state — use with care)
KUBEHUNTER_ACTIVE=false

#  Report Format 
# json | yaml | plain
KUBEHUNTER_REPORT_FORMAT=json

#  Output 
# Sub-directory under OUTPUT_DIR where reports are saved
KUBEHUNTER_REPORT_SUBDIR=kubehunter

#  Container Image 
# Used when kube-hunter is not installed natively but Docker is available
KUBEHUNTER_IMAGE=aquasec/kube-hunter:latest

#  Kubeconfig 
# Leave blank to use the default (~/.kube/config)
KUBECONFIG_PATH=