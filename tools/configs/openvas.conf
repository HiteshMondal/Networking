# tools/configs/openvas.conf
# OpenVAS / GVM connection & scan defaults for the toolkit
# Values are read by tools/vulnerability_scanning/openvas_scan.sh

#  GVM Manager Connection 
OPENVAS_HOST=127.0.0.1
OPENVAS_PORT=9390

# GVM command-line socket (used by gvm-cli / gvm-pyshell)
# Typical paths:
#   Kali / Debian:   /run/gvmd/gvmd.sock
#   Source build:    /usr/local/var/run/gvmd.sock
GVM_SOCKET=/run/gvmd/gvmd.sock

#  Credentials 
# Leave blank to prompt at runtime (recommended for production)
OPENVAS_USER=admin
OPENVAS_PASS=

#  Scan Defaults 
# Scan config UUIDs (retrieve with: gvm-cli socket --xml "<get_configs/>")
# Full and fast (default)
SCAN_CONFIG_UUID=daba56c8-73ec-11df-a475-002264764cea
# Full and fast, ultimate
# SCAN_CONFIG_UUID=698f691e-7489-11df-9d8c-002264764cea

# Default port list UUID (All IANA assigned TCP and UDP)
PORT_LIST_UUID=33d0cd82-57c6-11e1-8ed1-406186ea4fc5

# Report format: PDF
REPORT_FORMAT_UUID=c402cc3e-b531-11e1-9163-406186ea4fc5

# Scanner UUID (OpenVAS Default Scanner)
SCANNER_UUID=08b69003-5fc2-4037-a479-93b440211c73

#  Output 
# Reports are saved relative to the toolkit OUTPUT_DIR (set in settings.conf)
OPENVAS_REPORT_SUBDIR=openvas

# Maximum minutes to wait for a scan to complete before timing out (0 = infinite)
SCAN_TIMEOUT_MIN=120

# Poll interval in seconds while waiting for scan completion
SCAN_POLL_INTERVAL=30