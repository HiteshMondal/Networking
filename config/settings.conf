# /config/settings.conf
# Configuration file for Networking & Cybersecurity Toolkit

# Dashboard Settings
DASHBOARD_PORT=8000

# Log Settings
MAX_LOG_FILES=100
LOG_RETENTION_DAYS=30

# Python Command (python3 or python)
PYTHON_CMD="python3"

# PID File Location
PID_FILE="$PROJECT_ROOT/logs/dashboard.pid"

# Output Settings
# All script outputs should go to $PROJECT_ROOT/output
# All logs should go to $PROJECT_ROOT/logs

# Tool Preferences
AUTO_INSTALL_TOOLS=false  # Set to true to auto-install missing tools

# Security Settings
ENABLE_AUDIT_LOG=true