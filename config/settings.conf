#!/usr/bin/env bash
#  /config/settings.conf  —  Central configuration
#  Networking & Cybersecurity Automation Toolkit
#
#  Sourced by run.sh before any other file.  All subsystems read values from
#  here via exported variables — nothing should hardcode paths or timeouts.
#
#  Overriding values (in precedence order, highest first):
#    1. Environment variable exported before running:  export LOG_LEVEL=DEBUG
#    2. /config/settings.local.conf  (git-ignored, machine-specific)
#    3. This file's defaults
#
#  Add settings.local.conf to .gitignore:
#    echo 'config/settings.local.conf' >> .gitignore

#  Require PROJECT_ROOT 
# run.sh exports this before sourcing us.  All paths are derived from it.
: "${PROJECT_ROOT:?[settings.conf] PROJECT_ROOT must be exported before sourcing}"

#  Paths 

LOG_DIR="${PROJECT_ROOT}/logs"
OUTPUT_DIR="${PROJECT_ROOT}/output"
MODULES_DIR="${PROJECT_ROOT}/modules"
NETWORK_LAB_DIR="${PROJECT_ROOT}/network_lab"
DASHBOARD_DIR="${PROJECT_ROOT}/dashboard"
PID_FILE="${LOG_DIR}/dashboard.pid"

export LOG_DIR OUTPUT_DIR MODULES_DIR NETWORK_LAB_DIR DASHBOARD_DIR PID_FILE

#  Python interpreter 
# Auto-detected at source time.  Override with: export PYTHON_CMD=python3.11

if [[ -z "${PYTHON_CMD:-}" ]]; then
    if   command -v python3 &>/dev/null; then PYTHON_CMD="python3"
    elif command -v python  &>/dev/null; then PYTHON_CMD="python"
    else
        # Neither found — set the name anyway so error messages are meaningful
        PYTHON_CMD="python3"
        echo "[settings.conf] WARNING: python3 not found. Dashboard will not start." >&2
    fi
fi
export PYTHON_CMD

#  Dashboard 

# Port the Python dashboard server listens on.
DASHBOARD_PORT="${DASHBOARD_PORT:-8000}"

# CORS allowed origin.  Use '*' for local-only use.
# Restrict to 'http://localhost:8000' when running on a shared or remote host.
DASHBOARD_ORIGIN="${DASHBOARD_ORIGIN:-*}"

export DASHBOARD_PORT DASHBOARD_ORIGIN

#  Logging — core 

# Minimum level written to disk.  Messages below this weight are dropped.
# Values (ascending): DEBUG | INFO | SUCCESS | WARNING | ERROR | CRITICAL
LOG_LEVEL="${LOG_LEVEL:-INFO}"

# Maximum total log files to retain across all modules.
MAX_LOG_FILES="${MAX_LOG_FILES:-100}"

# Days after which log files are eligible for rotation / deletion.
LOG_RETENTION_DAYS="${LOG_RETENTION_DAYS:-30}"

# Enable the global append-only JSON audit trail (logs/toolkit.jsonl).
# Set to false only in ephemeral CI/test environments.
ENABLE_AUDIT_LOG="${ENABLE_AUDIT_LOG:-true}"

export LOG_LEVEL MAX_LOG_FILES LOG_RETENTION_DAYS ENABLE_AUDIT_LOG

#  Logging — structured JSON (logging.sh) 

# Enable per-module .jsonl files (read by dashboard for rich metadata).
# When false, logging.sh skips creating STRUCTURED_LOG_FILE but still writes
# to toolkit.jsonl (controlled separately by ENABLE_AUDIT_LOG above).
ENABLE_JSON_LOGS="${ENABLE_JSON_LOGS:-true}"

# Maximum size in KB of a single .jsonl file.  When exceeded, log_init
# opens a new timestamped file automatically (soft limit — checked at init).
JSON_LOG_MAX_KB="${JSON_LOG_MAX_KB:-4096}"

export ENABLE_JSON_LOGS JSON_LOG_MAX_KB

#  Script execution 

# Fallback timeout (seconds) for any script that does not have a named override.
DEFAULT_SCRIPT_TIMEOUT="${DEFAULT_SCRIPT_TIMEOUT:-200}"

# Per-script timeouts (seconds).
# Naming convention: TIMEOUT_<script_basename_without_.sh>
# These are exported so child processes (execute_script, _launch) can read them
# with:  timeout="${TIMEOUT_${script_stem}:-$DEFAULT_SCRIPT_TIMEOUT}"
TIMEOUT_detect_suspicious_net_linux="${TIMEOUT_detect_suspicious_net_linux:-800}"
TIMEOUT_forensic_collect="${TIMEOUT_forensic_collect:-400}"
TIMEOUT_malware_analysis="${TIMEOUT_malware_analysis:-600}"
TIMEOUT_lateral_movement_detect="${TIMEOUT_lateral_movement_detect:-300}"
TIMEOUT_log_analysis="${TIMEOUT_log_analysis:-300}"
TIMEOUT_cloud_exposure_audit="${TIMEOUT_cloud_exposure_audit:-200}"
TIMEOUT_data_exfil_detect="${TIMEOUT_data_exfil_detect:-300}"

export DEFAULT_SCRIPT_TIMEOUT
export TIMEOUT_detect_suspicious_net_linux TIMEOUT_forensic_collect
export TIMEOUT_malware_analysis TIMEOUT_lateral_movement_detect
export TIMEOUT_log_analysis TIMEOUT_cloud_exposure_audit TIMEOUT_data_exfil_detect

#  Tool management 

# When true, the toolkit attempts to install missing system network_lab via apt/brew.
# Leave false in production; enable only in isolated dev environments.
AUTO_INSTALL_network_lab="${AUTO_INSTALL_network_lab:-false}"

export AUTO_INSTALL_network_lab

#  Security 

# modules tagged at or above this risk level prompt for explicit confirmation.
# Valid values: low | medium | high
CONFIRM_RISK_LEVEL="${CONFIRM_RISK_LEVEL:-high}"

# Validate the value — catch typos early rather than silently accepting them.
case "$CONFIRM_RISK_LEVEL" in
    low|medium|high) ;;
    *)
        echo "[settings.conf] WARNING: Invalid CONFIRM_RISK_LEVEL '${CONFIRM_RISK_LEVEL}'. Defaulting to 'high'." >&2
        CONFIRM_RISK_LEVEL="high"
        ;;
esac

export CONFIRM_RISK_LEVEL

#  Alert thresholds (dashboard system monitor) 
# These are exported so dashboard/server.py can read them at startup via
# os.environ, seeding its _alert_cfg without hardcoded values.

ALERT_CPU_WARN="${ALERT_CPU_WARN:-70}"
ALERT_CPU_CRIT="${ALERT_CPU_CRIT:-90}"
ALERT_MEM_WARN="${ALERT_MEM_WARN:-75}"
ALERT_MEM_CRIT="${ALERT_MEM_CRIT:-90}"
ALERT_DISK_WARN="${ALERT_DISK_WARN:-80}"
ALERT_DISK_CRIT="${ALERT_DISK_CRIT:-95}"

export ALERT_CPU_WARN ALERT_CPU_CRIT
export ALERT_MEM_WARN ALERT_MEM_CRIT
export ALERT_DISK_WARN ALERT_DISK_CRIT

#  SMTP (alert notifications) 
# Host and port are safe to store here.
# SMTP_USER, SMTP_PASS, SMTP_FROM must be set as environment variables only —
# never commit credentials to version control.

SMTP_HOST="${SMTP_HOST:-smtp.gmail.com}"
SMTP_PORT="${SMTP_PORT:-587}"

export SMTP_HOST SMTP_PORT
# SMTP_USER / SMTP_PASS / SMTP_FROM  — not set here intentionally

#  Local overrides (always last) 
# settings.local.conf wins over every default above.
# Create it for machine-specific values (custom ports, local paths, etc.).
# Make sure it is git-ignored:  echo 'config/settings.local.conf' >> .gitignore

_local_conf="${PROJECT_ROOT}/config/settings.local.conf"
if [[ -f "$_local_conf" ]]; then
    # shellcheck source=/dev/null
    source "$_local_conf"
fi
unset _local_conf